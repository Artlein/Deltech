version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: deltech-db
    environment:
      POSTGRES_DB: deltechecom
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/migration/V1__init.sql:/docker-entrypoint-initdb.d/V1__init.sql
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deltech-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/deltechecom
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=5J2c8XW3Nq9Vb1Z4m7K6p8Q9wR2yU4t6v8Y0z1A2B3C4D5E6F7G8H9I0J1K2L3M4N
      - JWT_EXPIRATION=86400000
      - APP_UPLOAD_DIR=/app/uploads
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads
    restart: always

  frontend:
    image: nginx:alpine
    container_name: deltech-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
  uploads:
